<!DOCTYPE html>
<html>
<head>
  <title>Report Card</title>
  <style>
    body { font-family: Arial, sans-serif; font-size: 12px; }
    h2 { text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid black; padding: 4px; text-align: center; }
  </style>
</head>
<body>
  <h2>Report Card - {{ term.name }}</h2>
  <p>Class: {{ grade }} | Section: {{ sec }}</p>

  {% for student in data %}
    <h3>{{ student.student }}</h3>
    <table>
      <tr>
        <th>Subject</th>
        <th>Total Marks</th>
      </tr>
      {% for t in student.totals %}
      <tr>
        <td>{{ t.subject }}</td>
        <td>{{ t.total }}</td>
      </tr>
      {% endfor %}
    </table>
    <br>
  {% endfor %}
</body>
</html>
