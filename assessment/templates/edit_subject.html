{% extends "base.html" %}

{% block title %}Edit Subjects{% endblock %}

{% block content %}
<h2>Edit Subject</h2>

<form method="post">
  {% csrf_token %}
  <label for="name">Subject Name:</label>
  <input type="text" id="name" name="name" value="{{ subject.name }}" required><br><br>

  <label for="grade">Grade:</label>
  <input type="text" id="grade" name="grade" value="{{ subject.grade }}" required><br><br>

  <label for="full_marks">Full Marks:</label>
  <input type="number" id="full_marks" name="full_marks" value="{{ subject.full_marks }}" required><br><br>

  <button type="submit">Update Subject</button>
</form>

<a href="{% url 'manage_subjects' %}">Back to Manage Subjects</a>

{% endblock %}
